<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>Animal Shelter</title>

  <style>

    body{
      font-family: Arial, Helvetica, sans-serif;
      margin:40px;
      background:#f5f5f5;
    }

    nav{
      margin-bottom:25px;
    }

    nav a{
      margin-right:18px;
      text-decoration:none;
      font-weight:bold;
      color:#1565c0;
    }

    nav a:hover{
      text-decoration:underline;
    }

    main{
      background:white;
      padding:30px;
      border-radius:8px;
      box-shadow:0 0 8px rgba(0,0,0,.1);
    }

    h1{
      color:#333;
    }

    .buttons{
      margin-top:30px;
    }

    .button{
      display:inline-block;
      margin-right:15px;
      padding:12px 20px;
      background:#1976d2;
      color:white;
      text-decoration:none;
      border-radius:5px;
    }

    .button:hover{
      background:#0d47a1;
    }

  </style>

</head>

<body>

<nav>
  <a th:href="@{/}">Home</a>
  <a th:href="@{/animals}">All Animals</a>
  <a th:href="@{/animals/new}">Add Animal</a>
</nav>

<main>

  <h1>Welcome to the Shelter</h1>

  <p>
    This application lets you manage shelter animals.
    You can browse available animals, add new ones,
    and adopt animals depending on your user role.
  </p>

  <div class="buttons">

    <a class="button"
       th:href="@{/animals}">
      View Animals
    </a>

    <a class="button"
       th:href="@{/animals/new}">
      Add Animal
    </a>

  </div>

</main>

</body>

</html>
