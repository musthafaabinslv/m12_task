<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>

  <meta charset="UTF-8">

  <title>Add Animal</title>

  <style>

    body{
      font-family:Arial, Helvetica, sans-serif;
      margin:40px;
      background:#f5f5f5;
    }

    nav{
      margin-bottom:25px;
    }

    nav a{
      margin-right:18px;
      text-decoration:none;
      color:#1565c0;
      font-weight:bold;
    }

    form{
      background:white;
      padding:30px;
      border-radius:8px;
      max-width:600px;
      box-shadow:0 0 8px rgba(0,0,0,.1);
    }

    label{
      display:block;
      margin-top:18px;
      font-weight:bold;
    }

    input,
    select,
    textarea{

      width:100%;
      padding:10px;
      margin-top:6px;
      box-sizing:border-box;
    }

    textarea{
      height:120px;
    }

    button{

      margin-top:25px;
      padding:12px 24px;
      background:#1976d2;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    button:hover{
      background:#0d47a1;
    }

  </style>

</head>

<body>

<nav>

  <a th:href="@{/}">Home</a>

  <a th:href="@{/animals}">
    All Animals
  </a>

  <a th:href="@{/animals/new}">
    Add Animal
  </a>

</nav>

<h1>Add New Animal</h1>

<form
        th:action="@{/animals}"
        th:object="${form}"
        method="post">

  <label for="name">
    Animal Name
  </label>

  <input
          id="name"
          type="text"
          th:field="*{name}"
          required>

  <label for="type">
    Animal Type
  </label>

  <select
          id="type"
          th:field="*{type}"
          required>

    <option value="">
      Select type
    </option>

    <option
            th:each="type : ${types}"
            th:value="${type}"
            th:text="${type}">
    </option>

  </select>

  <label for="breed">
    Breed
  </label>

  <input
          id="breed"
          type="text"
          th:field="*{breed}">

  <label for="age">
    Age
  </label>

  <input
          id="age"
          type="number"
          min="0"
          th:field="*{age}">

  <label for="description">
    Description
  </label>

  <textarea
          id="description"
          th:field="*{description}">
    </textarea>

  <label for="imageUrl">
    Image URL / Image File Name
  </label>

  <input
          id="imageUrl"
          type="text"
          th:field="*{imageUrl}">

  <button type="submit">
    Add Animal
  </button>

  <a th:href="@{/animals}">
    Back to List
  </a>

</form>

</body>

</html>
