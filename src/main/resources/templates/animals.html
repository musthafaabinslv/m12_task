<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  TASK A — ADD THYMELEAF                                          ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  This is a plain static HTML file — the animal list is           ║
  ║  hard-coded and the form does not work yet.                      ║
  ║                                                                  ║
  ║  Your job:                                                       ║
  ║  1. Move this file to:                                           ║
  ║       src/main/resources/templates/animals.html                  ║
  ║  2. Add the Thymeleaf namespace to <html>:                       ║
  ║       xmlns:th="http://www.thymeleaf.org"                        ║
  ║  3. Create AnimalPageController (in controller/)                 ║
  ║       @GetMapping("/animals")  → pass List<AnimalResponse>       ║
  ║       @GetMapping("/animals/new") → pass empty AnimalForm        ║
  ║       @PostMapping("/animals") → call service, redirect          ║
  ║  4. Replace the hard-coded <li> elements with th:each            ║
  ║  5. Add th:src / th:alt to the <img> tags                        ║
  ║     Keep width/height/object-fit as plain HTML attributes        ║
  ║  6. Update the form action with th:action and bind               ║
  ║     fields with th:object / th:field                             ║
  ║                                                                  ║
  ║  ROLE-BASED UI (adoption feature — see SecurityConfig):          ║
  ║  7. In AnimalPageController, expose "isAdmin"/"isUser" model     ║
  ║     attributes, derived from the current Authentication's        ║
  ║     authorities (ROLE_ADMIN / ROLE_USER — a logged-in user is    ║
  ║     never both).                                                 ║
  ║  8. Only render the "Add a new animal" section when isAdmin is   ║
  ║     true (the backend also rejects POST /animals for non-admins).║
  ║  9. Per animal, show an "Adopt" button only when isUser is true  ║
  ║     AND the animal's status is AVAILABLE. It should POST to      ║
  ║       /api/animals/{id}/adopt                                    ║
  ║ 10. When isAdmin is true and the animal is ADOPTED, display its  ║
  ║     adoptionNote (already computed server-side in                ║
  ║     AnimalResponse) next to the status — everyone else just      ║
  ║     sees the bare "ADOPTED" status.                              ║
  ╚══════════════════════════════════════════════════════════════════╝
-->
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8">
  <title>All Animals</title>

  <style>

    body{
      font-family: Arial, Helvetica, sans-serif;
      margin:40px;
      background:#f5f5f5;
    }

    nav{
      margin-bottom:25px;
    }

    nav a{
      margin-right:18px;
      text-decoration:none;
      font-weight:bold;
      color:#1565c0;
    }

    nav a:hover{
      text-decoration:underline;
    }

    h1{
      color:#333;
    }

    ul{
      list-style:none;
      padding:0;
    }

    li{
      display:flex;
      gap:20px;
      margin-bottom:25px;
      background:white;
      padding:20px;
      border-radius:8px;
      box-shadow:0 0 8px rgba(0,0,0,.1);
    }

    img{
      border-radius:8px;
    }

    .details{
      flex:1;
    }

    .details p{
      margin-top:10px;
    }

    .status{
      font-weight:bold;
      color:green;
    }

    .actions{
      margin-top:25px;
    }

    .button{
      display:inline-block;
      padding:10px 18px;
      background:#1976d2;
      color:white;
      text-decoration:none;
      border-radius:5px;
      margin-right:10px;
    }

    .button:hover{
      background:#0d47a1;
    }

  </style>

</head>

<body>

<nav>
  <a th:href="@{/}">Home</a>
  <a th:href="@{/animals}">All Animals</a>

  <a th:if="${isAdmin}"
     th:href="@{/animals/new}">
    Add Animal
  </a>

  <a href="/swagger-ui/index.html">
    Swagger UI
  </a>
</nav>

<main>

  <h1>Shelter Animals</h1>

  <ul>

    <li th:each="animal : ${animals}">

      <img
              th:src="${animal.imageUrl}"
              th:alt="${animal.name}"
              width="300"
              height="200"
              style="object-fit: cover;">

      <div class="details">

        <h2 th:text="${animal.name}">Animal Name</h2>

        <p>
          <strong>Type:</strong>
          <span th:text="${animal.type}"></span>
        </p>

        <p>
          <strong>Breed:</strong>
          <span th:text="${animal.breed}"></span>
        </p>

        <p>
          <strong>Age:</strong>
          <span th:text="${animal.age}"></span>
        </p>

        <p>
          <strong>Status:</strong>

          <span class="status"
                th:text="${animal.status}">
                    </span>
        </p>

        <p th:text="${animal.description}">
          Description
        </p>

      </div>

    </li>

  </ul>

  <div class="actions">

    <a class="button"
       th:if="${isAdmin}"
       th:href="@{/animals/new}">
      Add Animal
    </a>

  </div>

</main>

</body>

</html>
